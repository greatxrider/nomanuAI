<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NomanuAI Meeting Background — Dark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --color-brand: #e56518;
    --color-brand-light: #f5a623;
    --color-brand-dark: #c55a11;
    --color-honey: #f5a623;
    --color-honey-light: #ffd966;
    --color-honey-dark: #c88a14;
    --hex-clip: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; }
  body {
    font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    background: #000;
    letter-spacing: -0.01em;
  }

  .stage {
    position: relative;
    width: 1920px;
    height: 1080px;
    background: #000000;
    overflow: hidden;
  }

  /* Honeycomb pattern at site-hero opacity so the LOGO is dominant */
  .pattern {
    position: absolute;
    inset: 0;
    background-image: url('/assets/beeInspiration/2754781-2.jpg');
    background-size: cover;
    background-position: center;
    opacity: 0.32;
  }

  /* Subtle orange wash anchored opposite the logo */
  .glow-tr {
    position: absolute;
    width: 1300px; height: 1300px;
    top: -480px; right: -380px;
    background: radial-gradient(circle, rgba(229,101,24,0.20) 0%, rgba(245,166,35,0.06) 45%, transparent 72%);
    filter: blur(50px);
    pointer-events: none;
  }
  .glow-bl {
    position: absolute;
    width: 1000px; height: 1000px;
    bottom: -380px; left: -300px;
    background: radial-gradient(circle, rgba(245,166,35,0.10) 0%, transparent 70%);
    filter: blur(40px);
    pointer-events: none;
  }

  /* Vignette so the speaker stands clean against the pattern */
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 58% 68% at 50% 56%,
      rgba(0,0,0,0.78) 0%,
      rgba(0,0,0,0.42) 42%,
      transparent 80%);
  }

  /* LOGO — unmistakably the hero */
  .logo {
    position: absolute;
    top: 110px;
    left: 130px;
    width: 580px;
    filter: drop-shadow(0 12px 40px rgba(0,0,0,0.55));
  }
  .logo img { width: 100%; display: block; }

  /* A single clean accent rule under the logo, in brand orange */
  .logo-rule {
    position: absolute;
    top: 250px;
    left: 132px;
    width: 120px;
    height: 2px;
    background: linear-gradient(90deg,
      var(--color-brand) 0%,
      var(--color-honey) 60%,
      transparent 100%);
  }

  /* Small lockup line directly beneath the rule */
  .logo-tag {
    position: absolute;
    top: 268px;
    left: 132px;
    font-family: 'Exo 2', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.55);
  }

  /* Glass-hex badge — top-right, restrained */
  .badge {
    position: absolute;
    top: 150px;
    right: 130px;
    display: inline-flex;
    align-items: center;
    padding: 13px 28px 13px 24px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.10);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    clip-path: polygon(10px 0%, calc(100% - 10px) 0%, 100% 50%, calc(100% - 10px) 100%, 10px 100%, 0% 50%);
    color: rgba(255, 255, 255, 0.85);
    font-family: 'Exo 2', sans-serif;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.26em;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .badge .hex-mark {
    width: 12px; height: 14px;
    background: linear-gradient(135deg, var(--color-brand) 0%, var(--color-brand-dark) 100%);
    clip-path: var(--hex-clip);
    margin-right: 14px;
    box-shadow: 0 0 12px rgba(229, 101, 24, 0.55);
  }

  /* Tagline — bottom-left, Exo 2 800 to echo the logo wordmark's weight */
  .tagline-block {
    position: absolute;
    bottom: 130px;
    left: 132px;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }
  .tagline-rule {
    width: 110px;
    height: 2px;
    background: linear-gradient(90deg,
      rgba(229,101,24,0) 0%,
      rgba(229,101,24,0.85) 30%,
      rgba(245,166,35,1) 50%,
      rgba(229,101,24,0.85) 70%,
      rgba(229,101,24,0) 100%);
  }
  .tagline {
    font-family: 'Exo 2', sans-serif;
    font-weight: 800;
    font-size: 44px;
    line-height: 1;
    letter-spacing: -0.025em;
    background: linear-gradient(120deg,
      var(--color-brand) 0%,
      var(--color-honey) 28%,
      var(--color-brand) 52%,
      var(--color-honey-light) 76%,
      var(--color-brand) 100%);
    background-size: 200% 100%;
    background-position: 30% 50%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 0 32px rgba(229, 101, 24, 0.20));
  }

  /* URL — bottom-right */
  .url {
    position: absolute;
    bottom: 130px;
    right: 132px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 14px;
  }
  .url-rule {
    width: 70px;
    height: 1px;
    background: rgba(229, 101, 24, 0.7);
  }
  .url-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 17px;
    font-weight: 500;
    color: rgba(245, 245, 247, 0.72);
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="pattern"></div>
    <div class="glow-tr"></div>
    <div class="glow-bl"></div>
    <div class="vignette"></div>

    <div class="logo">
      <img src="/assets/nomanuai-logo-white.png" alt="NomanuAI">
    </div>
    <div class="logo-rule"></div>
    <div class="logo-tag">AI Automation &middot; Engineering Studio</div>

    <div class="badge">
      <span class="hex-mark"></span>
      <span>Reimagine What's Possible</span>
    </div>

    <div class="tagline-block">
      <div class="tagline-rule"></div>
      <div class="tagline">Build Smarter. Ship Faster.</div>
    </div>

    <div class="url">
      <div class="url-rule"></div>
      <div class="url-text">nomanuai.com</div>
    </div>
  </div>
</body>
</html>
