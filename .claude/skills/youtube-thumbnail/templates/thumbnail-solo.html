<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT Thumbnail - [TOPIC]</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Newsreader:wght@500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #2a2a2a;
      padding: 40px;
    }

    .canvas {
      width: 1280px;
      height: 720px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #0A0B0C 0%, #141619 50%, #0f1215 100%);
    }

    /* Optional: AI-generated background image
    .canvas {
      background: url('[BG_IMAGE_PATH]') center/cover no-repeat;
    }
    */

    /* Dark overlay for text readability (use with AI backgrounds) */
    .canvas::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        rgba(10, 11, 12, 0.92) 0%,
        rgba(10, 11, 12, 0.7) 40%,
        rgba(10, 11, 12, 0.15) 70%,
        transparent 100%
      );
      z-index: 1;
    }

    /* ── Speaker Photo ── */
    .speaker-photo {
      position: absolute;
      right: -20px;
      bottom: 0;
      width: 58%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      z-index: 0;
    }

    /* Gradient fade on left edge of photo */
    .photo-fade {
      position: absolute;
      right: 0;
      top: 0;
      width: 62%;
      height: 100%;
      background: linear-gradient(to right, #0A0B0C 0%, transparent 45%);
      z-index: 1;
    }

    /* ── Headline Text ── */
    .headline-area {
      position: absolute;
      left: 60px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      max-width: 520px;
    }

    .headline {
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      font-size: 88px;
      line-height: 0.92;
      color: white;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      text-shadow: 0 4px 30px rgba(0,0,0,0.6);
    }

    .headline .accent {
      color: #C5A572;
    }

    /* Optional: gold underline on accent word */
    .headline .underline {
      position: relative;
      display: inline-block;
    }

    .headline .underline::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 100%;
      height: 6px;
      background: #C5A572;
    }

    /* ── Brand Mark (subtle) ── */
    .brand-mark {
      position: absolute;
      bottom: 24px;
      left: 60px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 10;
    }

    .brand-mark .logo {
      width: 30px;
      height: 30px;
      background: rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Newsreader', serif;
      font-size: 17px;
      color: rgba(255,255,255,0.6);
      font-weight: 500;
    }

    .brand-mark .name {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Subtle gold accent line ── */
    .accent-line {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(to right, #C5A572 0%, transparent 60%);
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="canvas">

    <!-- Speaker photo (replace src with actual path) -->
    <img class="speaker-photo" src="[PHOTO_PATH]" alt="[SPEAKER_NAME]">

    <!-- Gradient fade over photo left edge -->
    <div class="photo-fade"></div>

    <!-- Headline — 3-5 words max -->
    <div class="headline-area">
      <div class="headline">
        [LINE_1]<br>
        <span class="accent">[LINE_2]</span>
      </div>
    </div>

    <!-- Brand mark (subtle) -->
    <div class="brand-mark">
      <div class="logo">N</div>
      <span class="name">NGM</span>
    </div>

    <!-- Bottom accent -->
    <div class="accent-line"></div>
  </div>
</body>
</html>
